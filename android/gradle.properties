org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Kotlin incremental compilation cannot compute relative paths between files on
# different Windows drive letters (project on G:, pub cache on C:), which
# corrupts the incremental caches and breaks the build. Disable it.
kotlin.incremental=false
